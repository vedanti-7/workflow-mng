<div class="glow"></div>

<div class="login-container">

  <div class="logo">
    WorkFlow
    <span class="logo-dot"></span>
  </div>

  <h2 class="title">Forgot Password</h2>
  <p class="subtitle">Enter your registered email to receive a reset link</p>

  <form (ngSubmit)="submit()">

    <div class="input-group">
      <label class="input-label">Email Address</label>
      <input
        type="email"
        name="email"
        [(ngModel)]="email"
        placeholder="your@email.com"
        class="input-field"
        required />
    </div>

    <button type="submit" class="btn-login" [disabled]="submitting">
      {{ submitting ? 'Sending...' : 'Send Reset Link' }}
    </button>

  </form>

  <div class="divider">or</div>

  <div class="signup-section">
    Remembered it?
    <a routerLink="/" class="btn-signup">Back to Login</a>
  </div>

</div>

<!-- Dialog — sits at body level via absolute positioning on the host -->
<div *ngIf="showDialog" class="dialog-backdrop" (click)="closeDialog()">
  <div class="dialog-box" (click)="$event.stopPropagation()">

    <div class="dialog-icon">{{ isError ? '⚠️' : '✉️' }}</div>

    <p class="dialog-title">{{ isError ? 'Not Found' : 'Reset Link Sent' }}</p>

    <p class="dialog-msg">{{ dialogMessage }}</p>

    <button class="btn-login" style="margin-top:0;margin-bottom:0;" (click)="closeDialog()">
      OK
    </button>

  </div>
</div>
