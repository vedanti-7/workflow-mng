<div class="glow"></div>

<div class="login-container">

  <div class="logo">
    WorkFlow
    <span class="logo-dot"></span>
  </div>

  <h2 class="title">Welcome Back</h2>
  <p class="subtitle">Sign in to continue</p>

  <form (ngSubmit)="login()">

    <div class="input-group">
      <label class="input-label">User ID</label>
      <input
        type="text"
        name="userId"
        [(ngModel)]="userId"
        placeholder="Enter user ID (msg_...)"
        class="input-field"
        required
      />
    </div>

    <div class="input-group">
      <label class="input-label">Password</label>
      <input
        type="password"
        name="password"
        [(ngModel)]="password"
        placeholder="Enter password"
        class="input-field"
        required
      />

      <a routerLink="/forgot-password" class="forgot-password">
        Forgot password?
      </a>
    </div>

    <button type="submit" class="btn-login">
      Login
    </button>

  </form>

  <div class="divider">or</div>

  <div class="signup-section">
    New user?
    <a routerLink="/signup" class="btn-signup">
      Sign Up
    </a>
  </div>

</div>
