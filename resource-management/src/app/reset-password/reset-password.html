<div class="glow"></div>

<div class="login-container">

  <div class="logo">
    WorkFlow
    <span class="logo-dot"></span>
  </div>

  <h2 class="title">Reset Password</h2>
  <p class="subtitle">Choose a new password for your account</p>

  <div *ngIf="success"
       style="text-align:center; color:#34d399; font-size:0.95rem; padding:16px 0;">
    ✓ {{ message }}<br>
    <span style="color:#64748b; font-size:0.85rem;">Redirecting to login...</span>
  </div>

  <form (ngSubmit)="submit()" *ngIf="!success">

    <div class="input-group">
      <label class="input-label">New Password</label>
      <input
        type="password"
        name="newPassword"
        [(ngModel)]="newPassword"
        placeholder="New password"
        class="input-field"
        required />
    </div>

    <div class="input-group">
      <label class="input-label">Confirm Password</label>
      <input
        type="password"
        name="confirmPassword"
        [(ngModel)]="confirmPassword"
        placeholder="Confirm new password"
        class="input-field"
        required />
    </div>

    <p style="font-size:0.78rem; color:#64748b; margin-bottom:16px;">
      Must contain 1 capital letter, 1 special character, min 5 characters
    </p>

    <p *ngIf="error"
       style="color:#f87171; font-size:0.85rem; margin-bottom:12px; text-align:center;">
      {{ error }}
    </p>

    <button type="submit" class="btn-login" [disabled]="submitting || !token">
      {{ submitting ? 'Resetting...' : 'Reset Password' }}
    </button>

  </form>

  <div class="divider">or</div>

  <div class="signup-section">
    <a routerLink="/" class="btn-signup">Back to Login</a>
  </div>

</div>
