<div class="overflow-x-auto">
  <table class="min-w-full bg-white shadow rounded-lg">
    <thead class="bg-gray-200">
      <tr>
        <th class="py-2 px-4 text-left">Name</th>
        <th class="py-2 px-4 text-left">Skills</th>
        <th class="py-2 px-4 text-left">Status</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let emp of employees" class="border-b hover:bg-gray-50">
        <td class="py-2 px-4">{{ emp.name }}</td>
        <td class="py-2 px-4">{{ (emp.skills || []).join(', ') }}</td>
        <td class="py-2 px-4">
          <span
            [ngClass]="{
              'bg-green-200 text-green-800 px-2 py-1 rounded': emp.status === 'Billable',
              'bg-yellow-200 text-yellow-800 px-2 py-1 rounded': emp.status === 'Bench'
            }">
            {{ emp.status }}
          </span>
        </td>
      </tr>
    </tbody>
  </table>
</div>
